version: "2"
services:
  web:
    build: .
    ports:
      - "7001:7001"
    links:
      - mongo
    environment:
      MONGO_URI: mongodb://localhost:27017/query-server
  mongo:
    image: mongo:latest@sha256:0e145625e78b94224d16222ff2609c4621ff6e2c390300e4e6bf698305596792
    volumes:
      - /data/mongodb/db:/data/db
    ports:
      - "27017:27017"
